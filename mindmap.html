<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mind-Map — cyber.kharkov.ua</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700&family=Fira+Sans:wght@300;400;500&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0d1117; font-family:'Fira Sans',sans-serif; overflow:hidden; width:100vw; height:100vh; }
  header {
    position:fixed; top:0; left:0; right:0;
    padding:14px 28px; background:rgba(13,17,23,0.92);
    backdrop-filter:blur(8px); border-bottom:1px solid #1e2a3a;
    display:flex; align-items:center; justify-content:space-between; z-index:100;
  }
  header h1 { font-family:'Raleway',sans-serif; font-size:1rem; font-weight:700; color:#e8c97a; letter-spacing:2px; text-transform:uppercase; }
  header p { font-size:0.72rem; color:#4a6080; letter-spacing:1px; margin-top:2px; }
  .hint { font-size:0.7rem; color:#2a3a55; }
  svg { position:fixed; top:0; left:0; width:100vw; height:100vh; }
  .tooltip {
    position:fixed; background:#111b2e; border:1px solid #e8c97a44; border-radius:10px;
    padding:10px 14px; font-size:0.78rem; color:#a8c4e8; pointer-events:none;
    opacity:0; transition:opacity 0.2s; max-width:210px; z-index:200; line-height:1.5;
    box-shadow:0 8px 32px #00000088;
  }
  .tooltip.show { opacity:1; }
</style>
</head>
<body>
<header>
  <div>
    <h1>Структура сайту кафедри</h1>
    <p>cyber.kharkov.ua · ХНУ імені В.Н. Каразіна</p>
  </div>
  <div class="hint">🖱 Наведіть на вузол · Колесо миші — масштаб</div>
</header>
<svg id="svg"></svg>
<div class="tooltip" id="tip"></div>
<script>
const svg=document.getElementById('svg'),tip=document.getElementById('tip');
const W=window.innerWidth,H=window.innerHeight,cx=W/2,cy=H/2;
const tree={
  label:'Головна\nсторінка',color:'#e8c97a',textColor:'#0d1117',r:54,
  children:[
    {label:'Кафедра',color:'#5b8dee',r:40,angle:-130,desc:'Інформація про кафедру',
      children:[
        {label:'Викладачі',desc:'Склад та наукові досягнення'},
        {label:'Випускники',desc:"Кар'єра та успішні кейси"},
        {label:'Новини',desc:'Події та анонси кафедри'},
      ]},
    {label:'Навчальний\nпроцес',color:'#f0a500',r:44,angle:-48,desc:'Освітні програми та матеріали',
      children:[
        {label:'Екон.\nкібернетика',desc:'Аналітика та IT-технології'},
        {label:'Прикладна\nекономіка',desc:'Практичні методи аналізу'},
        {label:'Навчальні\nплани',desc:'Графіки та змісти дисциплін'},
        {label:'Відкриті\nзаняття',desc:'Публічні лекції від професіоналів'},
      ]},
    {label:'Наукова\nробота',color:'#36c98e',r:44,angle:48,desc:'Дослідження та публікації',
      children:[
        {label:'Вісник',desc:'Наукові дослідження, проблеми'},
        {label:'Конференції',desc:'Воркшопи, заходи'},
        {label:'Публікації',desc:'Праці, статті'},
        {label:'Монографії\nта підручники',desc:'Навчальна та наукова літ-ра'},
        {label:'Семінари',desc:'Обговорення'},
      ]},
    {label:'Абітурієнту',color:'#e05c8a',r:40,angle:130,desc:'Інформація для вступників',
      children:[
        {label:'Корисні\nпосилання',desc:'Ресурси для успішного вступу'},
        {label:'Інформаційна\nстрічка',desc:'Актуальні новини вступу'},
      ]},
    {label:'Контакти',color:'#9c6ade',r:38,angle:180,desc:"Зв'язок з кафедрою",
      children:[
        {label:'E-mail',desc:'cyber@karazin.ua'},
        {label:'Телефони',desc:'+380 50 082-19-90'},
        {label:'Адреса',desc:'майдан Свободи, 4, ауд. 6-52'},
        {label:'Соціальні\nмережі',desc:'Instagram, Telegram'},
      ]},
  ]
};
const D1=Math.min(W,H)*0.27,D2=Math.min(W,H)*0.16;
function rad(d){return d*Math.PI/180;}
function ns(t){return document.createElementNS('http://www.w3.org/2000/svg',t);}
function curve(x1,y1,x2,y2,col,dash){
  const p=ns('path');
  p.setAttribute('d',`M${x1},${y1} Q${(x1+x2)/2},${y1} ${x2},${y2}`);
  p.setAttribute('fill','none');
  p.setAttribute('stroke',col+'55');
  p.setAttribute('stroke-width',dash?'1':'1.8');
  if(dash)p.setAttribute('stroke-dasharray','5 4');
  return p;
}
function node(x,y,r,fill,stroke,label,tc,fs){
  const g=ns('g'); g.style.cursor='pointer';
  const c=ns('circle');
  c.setAttribute('cx',x);c.setAttribute('cy',y);c.setAttribute('r',r);
  c.setAttribute('fill',fill);c.setAttribute('stroke',stroke);c.setAttribute('stroke-width','2');
  c.style.filter=`drop-shadow(0 4px 18px ${stroke}44)`;
  c.style.transition='all 0.25s';
  g.appendChild(c);
  label.split('\n').forEach((ln,i,arr)=>{
    const t=ns('text');
    t.setAttribute('x',x);
    t.setAttribute('y',y+(i-(arr.length-1)/2)*(fs+3));
    t.setAttribute('text-anchor','middle');
    t.setAttribute('dominant-baseline','middle');
    t.setAttribute('fill',tc||'#fff');
    t.setAttribute('font-size',fs||10);
    t.setAttribute('font-family','\'Raleway\',sans-serif');
    t.setAttribute('font-weight','600');
    t.style.pointerEvents='none';
    t.textContent=ln;
    g.appendChild(t);
  });
  g.addEventListener('mouseenter',()=>{c.setAttribute('r',r*1.1);c.style.filter=`drop-shadow(0 6px 28px ${stroke}99)`;});
  g.addEventListener('mouseleave',()=>{c.setAttribute('r',r);c.style.filter=`drop-shadow(0 4px 18px ${stroke}44)`;});
  return g;
}
const LL=ns('g'),NL=ns('g');
svg.appendChild(LL);svg.appendChild(NL);
NL.appendChild(node(cx,cy,tree.r,tree.color,tree.color,tree.label,tree.textColor,12));
tree.children.forEach(b=>{
  const bx=cx+D1*Math.cos(rad(b.angle)),by=cy+D1*Math.sin(rad(b.angle));
  LL.appendChild(curve(cx,cy,bx,by,b.color));
  const bg=node(bx,by,b.r,'#0d1117',b.color,b.label,b.color,10);
  bg.addEventListener('mousemove',e=>{
    tip.innerHTML=`<strong style="color:${b.color}">${b.label.replace('\n',' ')}</strong><br>${b.desc}`;
    tip.classList.add('show');
    tip.style.left=(e.clientX+16)+'px';tip.style.top=(e.clientY-10)+'px';
  });
  bg.addEventListener('mouseleave',()=>tip.classList.remove('show'));
  NL.appendChild(bg);
  const cnt=b.children.length,spread=cnt<=2?38:cnt<=3?58:82;
  b.children.forEach((s,i)=>{
    const off=cnt>1?-spread/2+(spread/(cnt-1))*i:0;
    const sx=bx+D2*Math.cos(rad(b.angle+off)),sy=by+D2*Math.sin(rad(b.angle+off));
    LL.appendChild(curve(bx,by,sx,sy,b.color,true));
    const sr=Math.max(26,s.label.replace('\n','').length*4.2);
    const sg=node(sx,sy,sr,'#111b2e',b.color+'88',s.label,b.color+'cc',8.5);
    sg.addEventListener('mousemove',e=>{
      tip.innerHTML=`<span style="color:${b.color}">${b.label.replace('\n',' ')}</span> › <strong>${s.label.replace('\n',' ')}</strong><br><span style="color:#6a8aaa">${s.desc}</span>`;
      tip.classList.add('show');
      tip.style.left=(e.clientX+16)+'px';tip.style.top=(e.clientY-10)+'px';
    });
    sg.addEventListener('mouseleave',()=>tip.classList.remove('show'));
    NL.appendChild(sg);
  });
});
[...NL.children].forEach((n,i)=>{
  n.style.opacity='0';n.style.transition=`opacity 0.5s ease ${i*0.06}s`;
  requestAnimationFrame(()=>n.style.opacity='1');
});
const wrap=ns('g');
while(svg.firstChild)wrap.appendChild(svg.firstChild);
svg.appendChild(wrap);
wrap.setAttribute('transform','translate(0,52)');
let scale=1;
svg.addEventListener('wheel',e=>{
  e.preventDefault();
  scale=Math.min(2,Math.max(0.35,scale-e.deltaY*0.001));
  wrap.setAttribute('transform',`translate(0,52) scale(${scale}) translate(${cx*(1-scale)/scale},${(cy-52)*(1-scale)/scale})`);
},{passive:false});
</script>
</body>
</html>
